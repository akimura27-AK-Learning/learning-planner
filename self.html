document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }

;font-weight:700}\n  .t-mitosu.front,.t-mitosu.back{border-color:var(--blue)}\n  .t-mitosu .band{background:var(--blue)} .t-mitosu .cat{color:var(--blue)} .t-mitosu .rule{background:var(--blue-l)}\n  .t-mitosu .sub{background:var(--blue-l);color:var(--blue-d)} .t-mitosu .foot .fd{background:var(--blue)}\n  .t-mitosu.back{background:var(--blue-l)} .t-mitosu .qmark,.t-mitosu .qlabel{color:var(--blue)} .t-mitosu .pl,.t-mitosu .subcat{color:var(--blue-d)}\n  .t-jikkou.front,.t-jikkou.back{border-color:var(--green)}\n  .t-jikkou .band{background:var(--green)} .t-jikkou .cat{color:var(--green)} .t-jikkou .rule{background:var(--green-l)}\n  .t-jikkou .sub{background:var(--green-l);color:var(--green-d)} .t-jikkou .foot .fd{background:var(--green)}\n  .t-jikkou.back{background:var(--green-l)} .t-jikkou .qmark,.t-jikkou .qlabel{color:var(--green)} .t-jikkou .pl,.t-jikkou .subcat{color:var(--green-d)}\n  .t-furikaeru.front,.t-furikaeru.back{border-color:var(--orange)}\n  .t-furikaeru .band{background:var(--orange)} .t-furikaeru .cat{color:var(--orange)} .t-furikaeru .rule{background:var(--orange-l)}\n  .t-furikaeru .sub{background:var(--orange-l);color:var(--orange-d)} .t-furikaeru .foot .fd{background:var(--orange)}\n  .t-furikaeru.back{background:var(--orange-l)} .t-furikaeru .qmark,.t-furikaeru .qlabel{color:var(--orange)} .t-furikaeru .pl,.t-furikaeru .subcat{color:var(--orange-d)}\n  .searchwrap{max-width:1100px;margin:18px auto 0;display:flex;gap:10px;align-items:center;justify-content:center;flex-wrap:wrap}\n  .search{flex:1;min-width:240px;max-width:520px;position:relative}\n  .search input{width:100%;border:1.5px solid var(--line);border-radius:999px;padding:11px 40px 11px 18px;font-size:.92rem;font-family:inherit;background:#fff;color:var(--ink)}\n  .search input:focus{outline:none;border-color:#c9b48a}\n  .search .clr{position:absolute;right:12px;top:50%;transform:translateY(-50%);border:none;background:none;cursor:pointer;color:#b3ab97;font-size:1.1rem;font-weight:800;display:none}\n  .search.has .clr{display:block}\n  /* 絞り込みドロワー */\n  .filterbar{max-width:1100px;margin:12px auto 0;display:flex;flex-direction:column;gap:10px}\n  .filtrow{display:flex;gap:8px;flex-wrap:wrap;align-items:center;justify-content:center}\n  .flabel{font-size:.74rem;font-weight:800;color:#9a8f78;letter-spacing:.04em;min-width:84px;text-align:right}\n  .fchip{border:1.5px solid var(--line);background:#fff;border-radius:999px;padding:5px 13px;font-size:.78rem;font-weight:700;cursor:pointer;color:#6b6452;transition:.12s;user-select:none;white-space:nowrap}\n  .fchip[data-on=\"1\"]{background:var(--ink);color:#fff;border-color:transparent}\n  .filtertoggle{max-width:1100px;margin:12px auto 0;text-align:center}\n  .filterbody{display:none}\n  .filterbody.on{display:block;animation:drop .35s cubic-bezier(.2,.9,.3,1.1)}\n  /* お気に入り ★ */\n  .fav{position:absolute;z-index:6;width:8.5cqw;height:8.5cqw;border-radius:50%;border:none;background:rgba(255,255,255,.88);box-shadow:0 1px 4px -1px rgba(60,50,30,.45);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:5.2cqw;line-height:1;color:#c4b9a2;transition:.12s;padding:0;\n    top:1.8cqw;right:1.8cqw}\n  .fav.on{color:#fff;background:#f59e0b;box-shadow:0 2px 6px -1px rgba(245,158,11,.6)}\n  .fav:hover{transform:scale(1.18)}\n  .fav:hover::after{content:\"お気に入り\";position:absolute;top:-7cqw;right:0;background:#1f2430;color:#fff;font-size:3.3cqw;font-weight:700;padding:1cqw 2.5cqw;border-radius:6px;white-space:nowrap;z-index:7}\n  .scene{position:relative}\n  /* 今日の3枚モード */\n  .today{max-width:1100px;margin:6px auto 0;background:#fff;border:1.5px solid var(--line);border-radius:18px;box-shadow:0 14px 34px -24px rgba(60,50,30,.4);padding:20px 22px;display:none}\n  .today.on{display:block;animation:drop .4s cubic-bezier(.2,.9,.3,1.1)}\n  .today h2{font-size:1.15rem;margin-bottom:4px}\n  .today .tlead{color:#7c7565;font-size:.84rem;margin-bottom:16px;line-height:1.6}\n  .today-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}\n  @media(max-width:680px){.today-grid{grid-template-columns:1fr}}\n  .today-slot{display:flex;flex-direction:column;gap:10px}\n  .slot-head{font-size:.82rem;font-weight:800;text-align:center;padding:7px;border-radius:10px}\n  .slot-head.mitosu{background:var(--blue-l);color:var(--blue-d)}\n  .slot-head.jikkou{background:var(--green-l);color:var(--green-d)}\n  .slot-head.furikaeru{background:var(--orange-l);color:var(--orange-d)}\n  .slot-card{min-height:60px}\n  .slot-empty{border:2px dashed var(--line);border-radius:14px;padding:24px 10px;text-align:center;color:#b3ab97;font-size:.82rem;font-weight:700}\n  .today-acts{display:flex;gap:10px;justify-content:center;margin-top:16px;flex-wrap:wrap}\n  .badge-num{background:#fff;color:#b3ab97;border:1px solid var(--line);border-radius:999px;font-size:.72rem;font-weight:800;padding:2px 9px;margin-left:8px}\n  .empty{max-width:1100px;margin:40px auto;text-align:center;color:#9a8f78;font-weight:700}\n  footer{max-width:1100px;margin:48px auto 0;text-align:center;color:#b3ab97;font-size:.76rem;line-height:1.7}\n  @media (max-width:520px){.spot-inner{grid-template-columns:1fr;text-align:center;justify-items:center}.grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}}\n<\u002Fstyle><\u002Fhead><body>\n<header>\n  <div class=\"eyebrow\">SELF-REGULATED LEARNING<\u002Fdiv>\n  <h1>自己調整方略カード<\u002Fh1>\n  <div class=\"byline\">作成：木村明憲　／　原典：調整方略リスト<\u002Fdiv>\n  <p class=\"sub\">学びを「見通す・実行する・振り返る」で調整する方略を1枚＝1方略のカードに（全46枚）。<br>\n  「この場面でどの方略を使う?」を考える教材です。<\u002Fp>\n<\u002Fheader>\n\n<div class=\"menu\">\n  <button class=\"btn btn-howto\" id=\"howtoBtn\">📖 このカードの使い方<\u002Fbutton>\n  <button class=\"btn btn-play\" id=\"playBtn\">🎲 このカードでの遊び方<\u002Fbutton>\n  <button class=\"btn btn-learn\" id=\"learnBtn\">📚 このカードでの学び方<\u002Fbutton>\n  <button class=\"btn btn-main\" id=\"todayBtn\">🗓️ 今日の3枚<\u002Fbutton>\n<\u002Fdiv>\n<section class=\"panel\" id=\"howtoPanel\"><\u002Fsection>\n<section class=\"panel\" id=\"playPanel\"><\u002Fsection>\n<section class=\"panel\" id=\"learnPanel\"><\u002Fsection>\n\n<section class=\"today\" id=\"todayPanel\">\n  <h2>🗓️ 今日の3枚<\u002Fh2>\n  <div class=\"tlead\">「見通す・実行する・振り返る」から1枚ずつ選んで、今日の学びで意識する方略を決めましょう。各スロットの「ひく」で自動で選ぶか、カードの★から手動で入れ替えられます。<\u002Fdiv>\n  <div class=\"today-grid\">\n    <div class=\"today-slot\">\n      <div class=\"slot-head mitosu\">青｜見通す（学ぶ前）<\u002Fdiv>\n      <div class=\"slot-card\" id=\"slot-mitosu\"><div class=\"slot-empty\">まだ選んでいません<\u002Fdiv><\u002Fdiv>\n      <button class=\"mini-btn\" data-slot=\"見通す\" style=\"align-self:center\">この場面からひく<\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"today-slot\">\n      <div class=\"slot-head jikkou\">緑｜実行する（学習中）<\u002Fdiv>\n      <div class=\"slot-card\" id=\"slot-jikkou\"><div class=\"slot-empty\">まだ選んでいません<\u002Fdiv><\u002Fdiv>\n      <button class=\"mini-btn\" data-slot=\"実行する\" style=\"align-self:center\">この場面からひく<\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"today-slot\">\n      <div class=\"slot-head furikaeru\">橙｜振り返る（学んだあと）<\u002Fdiv>\n      <div class=\"slot-card\" id=\"slot-furikaeru\"><div class=\"slot-empty\">まだ選んでいません<\u002Fdiv><\u002Fdiv>\n      <button class=\"mini-btn\" data-slot=\"振り返る\" style=\"align-self:center\">この場面からひく<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"today-acts\">\n    <button class=\"btn btn-main\" id=\"todayAllBtn\">🎲 3枚まとめてひく<\u002Fbutton>\n    <button class=\"btn btn-ghost\" id=\"todayClearBtn\">クリア<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"spotlight\" id=\"spotlight\">\n  <div class=\"spot-inner\">\n    <div class=\"spot-badge\" id=\"spotBadge\"><div style=\"font-size:3.4rem;font-weight:800\">?<\u002Fdiv><\u002Fdiv>\n    <div>\n      <div class=\"spot-q\">きょうのお題<\u002Fdiv>\n      <div class=\"spot-text\" id=\"spotText\"><\u002Fdiv>\n      <div class=\"spot-reveal\" id=\"spotReveal\"><\u002Fdiv>\n      <div class=\"spot-hint\">\n        <button class=\"mini-btn\" id=\"revealBtn\">方略名を見る<\u002Fbutton>\n        <button class=\"mini-btn\" id=\"anotherBtn\">別のお題をひく<\u002Fbutton>\n        <span>「いつ・どう使う?」を考えよう<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<div class=\"searchwrap\">\n  <div class=\"search\" id=\"searchBox\">\n    <input type=\"text\" id=\"searchInput\" placeholder=\"🔍 方略名・説明・場面でさがす（例：時間、気持ち、計画…）\" autocomplete=\"off\">\n    <button class=\"clr\" id=\"searchClr\" title=\"クリア\">×<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"filtertoggle\">\n  <button class=\"mini-btn\" id=\"filterToggle\">▾ くわしく絞り込む（プロセス・サブプロセス・カテゴリー）<\u002Fbutton>\n<\u002Fdiv>\n<div class=\"filterbody\" id=\"filterBody\">\n  <div class=\"filterbar\">\n    <div class=\"filtrow\" id=\"favRow\">\n      <span class=\"flabel\">表示<\u002Fspan>\n      <span class=\"fchip\" id=\"favOnly\" data-on=\"0\">★ お気に入りだけ<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"filtrow\" id=\"procRow\"><span class=\"flabel\">プロセス<\u002Fspan><\u002Fdiv>\n    <div class=\"filtrow\" id=\"catRow\"><span class=\"flabel\">カテゴリー<\u002Fspan><\u002Fdiv>\n    <div class=\"filtrow\" id=\"subRow\"><span class=\"flabel\">サブプロセス<\u002Fspan><\u002Fdiv>\n    <div class=\"filtrow\"><button class=\"mini-btn\" id=\"filterClear\">絞り込みをすべて解除<\u002Fbutton><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"bar\" id=\"phaseBar\">\n  <span class=\"count\" id=\"count\"><\u002Fspan>\n  <span class=\"sep\"><\u002Fspan>\n  <div class=\"chip ph-mitosu\" data-phase=\"見通す\" data-on=\"1\"><span class=\"dot\" style=\"background:var(--blue)\"><\u002Fspan>見通す<\u002Fdiv>\n  <div class=\"chip ph-jikkou\" data-phase=\"実行する\" data-on=\"1\"><span class=\"dot\" style=\"background:var(--green)\"><\u002Fspan>実行する<\u002Fdiv>\n  <div class=\"chip ph-furikaeru\" data-phase=\"振り返る\" data-on=\"1\"><span class=\"dot\" style=\"background:var(--orange)\"><\u002Fspan>振り返る<\u002Fdiv>\n<\u002Fdiv>\n<div class=\"bar\">\n  <button class=\"btn btn-main\" id=\"drawBtn\">🎲 お題をひく<\u002Fbutton>\n  <button class=\"btn btn-ghost\" id=\"shuffleBtn\">↻ シャッフル<\u002Fbutton>\n  <button class=\"btn btn-ghost\" id=\"flipAllBtn\">すべて裏返す<\u002Fbutton>\n  <button class=\"btn btn-ghost\" id=\"resetBtn\">リセット<\u002Fbutton>\n<\u002Fdiv>\n<div class=\"grid\" id=\"grid\"><\u002Fdiv>\n<div class=\"empty\" id=\"empty\" style=\"display:none\">表示する方略がありません。フィルターを選び直してください。<\u002Fdiv>\n<footer>自己調整方略カード（全46枚）｜見通す・実行する・振り返る<br>作成：木村明憲　／　原典：調整方略リスト<\u002Ffooter>\n\n<script>\nconst CARDS=[{\"phase\":\"見通す\",\"process\":\"課題\",\"sub\":\"課題理解\",\"cat\":\"認知\",\"layer\":\"自分で\",\"title\":\"課題を分けて理解する\",\"full\":\"課題を分解し，それらの関係を考え，解決策を検討して課題の意味を正確に理解する\",\"q\":\"課題が難しくて理解しづらいときはどうする?\"},{\"phase\":\"見通す\",\"process\":\"課題\",\"sub\":\"課題興味\",\"cat\":\"メタ認知\",\"layer\":\"自分で\",\"title\":\"知っていることを振り返る\",\"full\":\"課題をもとに身近なこと，知っていることを振り返る\",\"q\":\"課題を身近に感じるにはどうする?\"},{\"phase\":\"見通す\",\"process\":\"課題\",\"sub\":\"課題興味\",\"cat\":\"動機づけ調整\",\"layer\":\"自分で\",\"title\":\"解決後にできることを考える\",\"full\":\"課題を解決するとどのようなことがわかるのか，できるようになるのかを考え，前向きな気持ちを高める\",\"q\":\"課題に対してやる気ができないときはどうする?\"},{\"phase\":\"見通す\",\"process\":\"課題\",\"sub\":\"課題興味\",\"cat\":\"動機づけ調整\",\"layer\":\"自分で\",\"title\":\"自分を高めると言い聞かせる\",\"full\":\"提示された課題は大切なこと，自分の能力を高めるものであると自分に言い聞かせ，前向きな気持ちを高める\",\"q\":\"課題を前向きに受け止めることができるようにするにはどうする?\"},{\"phase\":\"見通す\",\"process\":\"課題\",\"sub\":\"課題興味\",\"cat\":\"動機づけ調整\",\"layer\":\"自分で\",\"title\":\"自分へのごほうびを考える\",\"full\":\"課題を解決したときの自分自身への褒美を考え，課題に対する前向きな気持ちを高める\",\"q\":\"課題をがんばろうとする気持ちをたかめるにはどうする?\"},{\"phase\":\"見通す\",\"process\":\"目標\",\"sub\":\"目標設定\",\"cat\":\"認知\",\"layer\":\"自分で\",\"title\":\"めあてから何ができるようになりたいのかを考える\",\"full\":\"課題の解決に向けた学習内容に関する目標を考える（問いを広げる—順序立てる—焦点化する）\",\"q\":\"学習の目標を決めるときにはどうする?\"},{\"phase\":\"見通す\",\"process\":\"目標\",\"sub\":\"目標設定\",\"cat\":\"メタ認知\",\"layer\":\"自分で\",\"title\":\"やりたいことの優先順位を考える\",\"full\":\"生成した目標を振り返り，優先順位を考える\",\"q\":\"やることが多くて迷うときはどうする?\"},{\"phase\":\"見通す\",\"process\":\"目標\",\"sub\":\"目標志向\",\"cat\":\"動機づけ調整\",\"layer\":\"自分で\",\"title\":\"能力が高まると言い聞かせる\",\"full\":\"目標を達成すると自らの能力を高めることができると自らに言い聞かせ，前向きな気持ちを高める\",\"q\":\"目標の達成にむけて前向きに取り組むためにはどうする?\"},{\"phase\":\"見通す\",\"process\":\"目標\",\"sub\":\"目標志向\",\"cat\":\"動機づけ調整\",\"layer\":\"自分で\",\"title\":\"目標の中身を整理する\",\"full\":\"目標の構造（内容—行動—調整）を整理し，何をすれば目標が達成するのかを考え，前向きな気持ちを高める\",\"q\":\"何をすれば目標を達成できるのかを整理するにはどうする?\"},{\"phase\":\"見通す\",\"process\":\"目標\",\"sub\":\"結果予期\",\"cat\":\"動機づけ調整\",\"layer\":\"自分で\",\"title\":\"学習後の成長を予想する\",\"full\":\"学習が終わった後の自分の成長（理解できること，身につけること）を予想し，前向きな気持ちを高める\",\"q\":\"これからの学習に対する気持ちを高めるにはどうする?\"},{\"phase\":\"見通す\",\"process\":\"目標\",\"sub\":\"結果予期\",\"cat\":\"動機づけ調整\",\"layer\":\"自分で\",\"title\":\"つくり出せる成果を予想する\",\"full\":\"目標が達成した際に創り出せる考え方や成果物を予想し，前向きな気持ちを高める\",\"q\":\"完成のゴールイメージをもって取り組むにはどうする?\"},{\"phase\":\"見通す\",\"process\":\"計画\",\"sub\":\"計画立案\",\"cat\":\"メタ認知\",\"layer\":\"自分で\",\"title\":\"前の計画を振り返る\",\"full\":\"自らが立てた過去の計画（学習活動，方法・方略，時間配分）を振り返り，学習計画の見通しをもつ\",\"q\":\"これから取り組む学習の見通しをもつためにどうする?\"},{\"phase\":\"見通す\",\"process\":\"計画\",\"sub\":\"計画立案\",\"cat\":\"動機づけ調整\",\"layer\":\"自分で\",\"title\":\"見本を参考に計画を立てる\",\"full\":\"書籍や見本，教師・他者の計画を参考に，長期課題・目標を基に短期課題・目標と学習活動を決める\",\"q\":\"計画の立て方に迷うときはどうする?\"},{\"phase\":\"見通す\",\"process\":\"計画\",\"sub\":\"計画立案\",\"cat\":\"リソース管理\",\"layer\":\"自分で\",\"title\":\"やり方を決めて準備する\",\"full\":\"短期課題・目標を達成するための方法・方略を決め，今後の学習の準備をする\",\"q\":\"今後の学習の課題を解決し，目標を達成するためにはどうする?\"},{\"phase\":\"見通す\",\"process\":\"計画\",\"sub\":\"計画立案\",\"cat\":\"リソース管理\",\"layer\":\"自分で\",\"title\":\"時間配分を決めて準備する\",\"full\":\"短期課題・目標を達成するための時間配分を決め，今後の学習の準備をする\",\"q\":\"学習を時間内に終えるためにどうする?\"},{\"phase\":\"見通す\",\"process\":\"計画\",\"sub\":\"自己効力\",\"cat\":\"動機づけ調整\",\"layer\":\"自分で\",\"title\":\"うまくできそうか考える\",\"full\":\"立案した計画を基に，学習をうまく実行することができそうかについて考え，前向きな気持ちを高める\",\"q\":\"計画に自信をもって取りかかるためにどうする?\"},{\"phase\":\"実行する\",\"process\":\"推進\",\"sub\":\"環境設定\",\"cat\":\"リソース管理\",\"layer\":\"自分で\",\"title\":\"学べる環境を整える\",\"full\":\"学習に適切な環境（物的・人的）を整える\",\"q\":\"集中して学べるようにするにはどうする?\"},{\"phase\":\"実行する\",\"process\":\"推進\",\"sub\":\"情報活用\",\"cat\":\"認知\",\"layer\":\"自分で\",\"title\":\"情報を集めて深める\",\"full\":\"情報を収集して理解を深める（知っていたこと—新しく知ったこと—新たな問い）\",\"q\":\"知りたいことを知るためにどうする?\"},{\"phase\":\"実行する\",\"process\":\"推進\",\"sub\":\"情報活用\",\"cat\":\"認知\",\"layer\":\"自分で\",\"title\":\"情報を関連づける\",\"full\":\"情報を関連付けて理解を深める（関連ごとにカテゴリーを生成し，ラベルを付ける）\",\"q\":\"集めた情報を整理して理解を深めるにはどうする?\"},{\"phase\":\"実行する\",\"process\":\"推進\",\"sub\":\"情報活用\",\"cat\":\"認知\",\"layer\":\"自分で\",\"title\":\"情報を多面的に見る\",\"full\":\"情報を多面的に見て，吟味して理解を深める（視点・教科の見方を働かせ再整理する）\",\"q\":\"情報の見方を変え，理解を深めるにはどうする?\"},{\"phase\":\"実行する\",\"process\":\"推進\",\"sub\":\"情報活用\",\"cat\":\"認知\",\"layer\":\"自分で\",\"title\":\"考えを構造化する\",\"full\":\"情報を構造化し，考えをつくって理解を深める（整理し，伝える準備をする）\",\"q\":\"自分の考えをまとめて伝える準備をするにはどうする?\"},{\"phase\":\"実行する\",\"process\":\"推進\",\"sub\":\"情報活用\",\"cat\":\"認知\",\"layer\":\"自分で\",\"title\":\"新たな価値を創造する\",\"full\":\"新たな価値を創造することを通して理解を深める\",\"q\":\"学んだことから新しい考えを生み出すにはどうする?\"},{\"phase\":\"実行する\",\"process\":\"推進\",\"sub\":\"情報活用\",\"cat\":\"認知\",\"layer\":\"自分で\",\"title\":\"創造した価値を発信する\",\"full\":\"創造した価値を発信することを通して理解を深める（転移）\",\"q\":\"つくりだした考えについてさらに深めるにはどうする?\"},{\"phase\":\"実行する\",\"process\":\"推進\",\"sub\":\"情報活用\",\"cat\":\"認知\",\"layer\":\"自分で\",\"title\":\"くり返して覚える\",\"full\":\"大切な情報をくり返し言ったり，書いたりして理解を深める（リハーサル）\",\"q\":\"大切なことをしっかり身につけるにはどうする?\"},{\"phase\":\"実行する\",\"process\":\"確認\",\"sub\":\"実行確認\",\"cat\":\"メタ認知\",\"layer\":\"自分で\",\"title\":\"めあてと今の学習がずれていないかを確かめる\",\"full\":\"実行している学習活動が課題・目標からずれていないかを自らに問いかけ，振り返り確認する\",\"q\":\"今の活動がめあてに合っているか確かめるにはどうする?\"},{\"phase\":\"実行する\",\"process\":\"確認\",\"sub\":\"実行確認\",\"cat\":\"メタ認知\",\"layer\":\"自分で\",\"title\":\"学習のやり方が良いかを確かめる\",\"full\":\"実行している方法・方略が適切かを自らに問いかけ，振り返り確認する\",\"q\":\"今のやり方が合っているか確かめるにはどうする?\"},{\"phase\":\"実行する\",\"process\":\"確認\",\"sub\":\"実行確認\",\"cat\":\"メタ認知\",\"layer\":\"自分で\",\"title\":\"時間と進み具合を確かめる\",\"full\":\"計画の時間配分と現在の進捗を比較し，予定時間内に達成するかを自らに問いかけ確認する\",\"q\":\"時間内に終わりそうかを確かめるにはどうする?\"},{\"phase\":\"実行する\",\"process\":\"確認\",\"sub\":\"環境確認\",\"cat\":\"メタ認知\",\"layer\":\"自分で\",\"title\":\"物的環境・人的環境を確かめる\",\"full\":\"学習に取り組みやすい物的・人的環境になっているかを自らに問いかけ確認する\",\"q\":\"今の環境が学習に合っているか確かめるにはどうする?\"},{\"phase\":\"実行する\",\"process\":\"確認\",\"sub\":\"情動・興味確認\",\"cat\":\"メタ認知\",\"layer\":\"自分で\",\"title\":\"体の反応から心の調子を確かめる\",\"full\":\"学習に向かう心や体の状態について自らに問いかけ，振り返り確認する\",\"q\":\"学習に向かう気持ちを確かめるには?\"},{\"phase\":\"実行する\",\"process\":\"調節\",\"sub\":\"実行調節\",\"cat\":\"リソース管理\",\"layer\":\"自分で\",\"title\":\"学習活動をよりよく変える\",\"full\":\"学習の課題・目標を基に自らの今後の学習活動を修正し，調節する\",\"q\":\"活動がめあてからずれていたときはどうする?\"},{\"phase\":\"実行する\",\"process\":\"調節\",\"sub\":\"実行調節\",\"cat\":\"リソース管理\",\"layer\":\"自分で\",\"title\":\"別のやり方に変える\",\"full\":\"課題・目標を達成する上でこれまでよりも効果的で効率的な方法・方略に調節する\",\"q\":\"今のやり方でうまくいかないときはどうする?\"},{\"phase\":\"実行する\",\"process\":\"調節\",\"sub\":\"実行調節\",\"cat\":\"リソース管理\",\"layer\":\"自分で\",\"title\":\"時間配分を調節する\",\"full\":\"進捗状況を基に学習活動の時間配分を変更し，調節する\",\"q\":\"時間が足りなくなってきたときはどうする?\"},{\"phase\":\"実行する\",\"process\":\"調節\",\"sub\":\"環境調節\",\"cat\":\"リソース管理\",\"layer\":\"自分で\",\"title\":\"学習環境を調節する\",\"full\":\"これまでよりも学習が進みやすい物的・人的環境に調節する\",\"q\":\"もっと学習を進めやすくするにはどうする?\"},{\"phase\":\"実行する\",\"process\":\"調節\",\"sub\":\"情動調節\",\"cat\":\"情動調整\",\"layer\":\"自分で\",\"title\":\"気持ちの原因を考え調節する\",\"full\":\"不快な感情が生じた際の動作や体の反応に目を向け，その原因や理由・意味を考え，調節する\",\"q\":\"いやな気持ちの原因に向き合うにはどうする?\"},{\"phase\":\"実行する\",\"process\":\"調節\",\"sub\":\"情動調節\",\"cat\":\"情動調整\",\"layer\":\"自分で\",\"title\":\"気持ちを切りかえる\",\"full\":\"不快な感情が生じた際，どうすれば解決できるか（学習から一旦離れる等）を考え，調節する\",\"q\":\"学習中にいやな気持ちになったときにはどうする?\"},{\"phase\":\"実行する\",\"process\":\"調節\",\"sub\":\"興味促進\",\"cat\":\"動機づけ調整\",\"layer\":\"自分で\",\"title\":\"挑戦と考えて前向きになる\",\"full\":\"困難な課題をやりがいのある挑戦であると考え，学習に対する前向きな気持ちを高める\",\"q\":\"難しい課題を前向きにとらえるにはどうする?\"},{\"phase\":\"実行する\",\"process\":\"調節\",\"sub\":\"興味促進\",\"cat\":\"動機づけ調整\",\"layer\":\"自分で\",\"title\":\"一旦離れる・得意なところを見つける\",\"full\":\"長時間行き詰まった際，向き合い方や解決方法（一旦離れる・得意な所を見つける等）を考える\",\"q\":\"長く行き詰まっ カードどうしをペアにして当てる神経衰弱。仲間のカードに気づく力がつきます。\"], [\"プロセス並べ（7ならべ）\", \"「課題→目標→計画→推進→確認→調節→評価→帰属→適用」の順に、トランプの7ならべのようにカードをつなげていきます。\"], [\"フェーズ・ばばぬき\", \"見通す・実行する・振り返るの3色でグループを作り、同じ色がそろったら場に出すばばぬき。最後まで持っていた人が負け。\"], [\"方略カルタ\", \"読み手がうらの問い「〜にはどんな方法がある?」を読み上げ、答えになるおもてのカードをすばやく取るカルタ。\"], [\"これ使った?ビンゴ\", \"3×3でカードを並べ、その日に実際に使えた方略をしるしていき、たて・よこ・ななめがそろったらビンゴ。\"]]}, LEARN={\"title\": \"このカードでの学び方\", \"items\": [[\"今日のマイ方略えらび\", \"学習を始める前に、見通す/実行する/振り返るから1枚ずつ「今日つかう方略」を選び、机に置いて意識しながら学びます。\"], [\"こまったとき作戦カード\", \"学習中に行き詰まったら、その場面に合うカード（例：調節・気持ちを切りかえる）を引いて、書いてある方法をためします。\"], [\"ふり返りペアトーク\", \"学習のあと、振り返るのカードを1枚選び、「今日この方略をどう使えたか」を友だちと話します。\"], [\"方略マイベスト3\", \"たくさんの方略の中から、自分に合う・よく使う方略ベスト3を選び、その理由を書いてみます。\"], [\"うらから考えるトレーニング\", \"うらの問いだけを見て、自分なりの答えを考えてから、おもての方略とくらべます。自分の学び方を広げられます。\"], [\"方略日記\", \"1日1枚カードを選び、その方略を実際に使ってみた結果を短く記録。1週間つづけると学び方の変化が見えます。\"]]}, HOWTO={\"title\": \"このカードの使い方\", \"lead\": \"このカードは、学びを自分で調整するための「方略（うまく学ぶためのコツ）」を1枚に1つまとめたものです。「見通す・実行する・振り返る」の3つの場面（フェーズ）に色分けされています。\", \"points\": [[\"カードのおもて\", \"方略の名前・くわしい説明・イラストがあります。右上は「方略カテゴリー」、左は「サブプロセス／プロセス」で、その方略が学びのどの場面のものかがわかります。\"], [\"カードのうら\", \"「〜にはどんな方法がある?」という問いがあります。おもての方略が、その問いの答えになっています。\"], [\"3つの色\", \"青=見通す（学ぶ前）、緑=実行する（学んでいる間）、橙=振り返る（学んだあと）。今の自分がどの場面にいるかを考えて選びます。\"], [\"使う場面\", \"学習の前・中・後に「今の自分にぴったりの方略はどれだろう?」と考えてカードを選び、実際にやってみます。\"]]};\nconst PDFILL=[\"data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/4gHYSUNDX1BST0ZJTEUAAQEAAAHIAAAAAAQwAABtbnRyUkdCIFhZWiAH4AABAAEAAAAAAABhY3NwAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAQAA9tYAAQAAAADTLQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAlkZXNjAAAA8AAAACRyWFlaAAABFAAAABRnWFlaAAABKAAAABRiWFlaAAABPAAAABR3dHB0AAABUAAAABRyVFJDAAABZAAAAChnVFJDAAABZAAAAChiVFJDAAABZAAAAChjcHJ0AAABjAAAADxtbHVjAAAAAAAAAAEAAAAMZW5VUwAAAAgAAAAcAHMAUgBHAEJYWVogAAAAAAAAb6IAADj1AAADkFhZWiAAAAAAAABimQAAt4UAABjaWFlaIAAAAAAAACSgAAAPhAAAts9YWVogAAAAAAAA9tYAAQAAAADTLXBhcmEAAAAAAAQAAAACZmYAAPKnAAANWQAAE9AAAApbAAAAAAAAAABtbHVjAAAAAAAAAAEAAAAMZW5VUwAAACAAAAAcAEcAbwBvAGcAbABlACAASQBuAGMALgA \"見通す\":\"t-mitosu\",\"実行する\":\"t-jikkou\",\"振り返る\":\"t-furikaeru\"};\nconst PHCOLOR={\"見通す\":\"var(--blue)\",\"実行する\":\"var(--green)\",\"振り返る\":\"var(--orange)\"};\n\n// パネル（使い方・遊び方・学び方）\nfunction fillHowto(){\n  const items=HOWTO.points.map(p=>`<div class=\"pitem howto\"><div class=\"pt\">■ ${p[0]}<\u002Fdiv><div class=\"pd\">${p[1]}<\u002Fdiv><\u002Fdiv>`).join('');\n  document.getElementById('howtoPanel').innerHTML=`<h2>${HOWTO.title}<\u002Fh2><div class=\"pintro\">${HOWTO.lead}<\u002Fdiv><div class=\"panel-grid\">${items}<\u002Fdiv>`;\n}\nfunction fillList(panelId,data,cls){\n  const items=data.items.map(p=>`<div class=\"pitem ${cls}\"><div class=\"pt\">● ${p[0]}<\u002Fdiv><div class=\"pd\">${p[1]}<\u002Fdiv><\u002Fdiv>`).join('');\n  document.getElementById(panelId).innerHTML=`<h2>${data.title}<\u002Fh2><div class=\"panel-grid\">${items}<\u002Fdiv>`;\n}\nfillHowto(); fillList('playPanel',PLAY,'play'); fillList('learnPanel',LEARN,'learn');\nfunction togglePanel(id){\n  ['howtoPanel','playPanel','learnPanel'].forEach(p=>{\n    const el=document.getElementById(p);\n    if(p===id) el.classList.toggle('on'); else el.classList.remove('on');\n  });\n}\ndocument.getElementById('howtoBtn').onclick=()=>togglePanel('howtoPanel');\ndocument.getElementById('playBtn').onclick=()=>togglePanel('playPanel');\ndocument.getElementById('learnBtn').onclick=()=>togglePanel('learnPanel');\n\n// ── 永続化（localStorage） ──\nconst LS_FAV='srlcards_fav', LS_TODAY='srlcards_today';\nfunction loadFav(){try{return new Set(JSON.parse(localStorage.getItem(LS_FAV)||'[]'));}catch(e){return new Set();}}\nfunction saveFav(){try{localStorage.setItem(LS_FAV,JSON.stringify([...state.fav]));}catch(e){}}\nfunction loadToday(){try{return JSON.parse(localStorage.getItem(LS_TODAY)||'{}');}catch(e){return {};}}\nfunction saveToday(){try{localStorage.setItem(LS_TODAY,JSON.stringify(state.today));}catch(e){}}\n\nlet state={\n  order:CARDS.map((_,i)=>i),\n  phases:{\"見通す\":1,\"実行する\":1,\"振り返る\":1},\n  search:\"\",\n  fProc:new Set(), fCat:new Set(), fSub:new Set(),\n  favOnly:false,\n  fav:loadFav(),\n  today:Object.assign({\"見通す\":null,\"実行する\":null,\"振り返る\":null},loadToday())\n};\n\nfunction matchSearch(c){\n  const q=state.search.trim().toLowerCase();\n  if(!q)return true;\n  return (c.title+c.full+c.q+c.sub+c.process+c.cat+c.phase).toLowerCase().includes(q);\n}\nfunction active(){\n  return state.order.filter(i=>{\n    const c=CARDS[i];\n    if(!state.phases[c.phase])return false;\n    if(state.favOnly && !state.fav.has(i))return false;\n    if(state.fProc.size && !state.fProc.has(c.process))return false;\n    if(state.fCat.size && !state.fCat.has(c.cat))return false;\n    if(state.fSub.size && !state.fSub.has(c.sub))return false;\n    if(!matchSearch(c))return false;\n    return true;\n  });\n}\nfunction cardHTML(i){\n  const c=CARDS[i],th=THEME[c.phase];\n  const svg=PDFILL[i]?`<img class=\"pdfill\" src=\"${PDFILL[i]}\" alt=\"\">`:`<svg viewBox=\"0 0 230 130\" xmlns=\"http://www.w3.org/2000/svg\">${ILLUST[i]}<\u002Fsvg>`;\n  const illustInner = svg;\n  return `<div class=\"scene\"><div class=\"card\" data-i=\"${i}\">\n    <div class=\"face front ${th}\">\n      <div class=\"band\"><span class=\"phase\">${c.phase}<\u002Fspan><span class=\"tags\"><span class=\"layer\">${c.layer}<\u002Fspan><span class=\"cat\">${c.cat}<\u002Fspan><\u002Fspan><\u002Fdiv>\n      <div class=\"body\">\n        <div class=\"subrow\"><span class=\"proc\"><b class=\"pcap\">プロセス<\u002Fb>${c.process}<\u002Fspan><span class=\"sub\"><b class=\"pcap pcap-sub\">サブ<br>プロセス<\u002Fb>${c.sub}<\u002Fspan><\u002Fdiv>\n        <div class=\"illust\"><button class=\"fav ${state.fav.has(i)?'on':''}\" data-fav=\"${i}\" title=\"お気に入り\">★<\u002Fbutton>${illustInner}<\u002Fdiv>\n        <div class=\"title\">${c.title}<\u002Fdiv>\n        <div class=\"rule\"><\u002Fdiv>\n        <div class=\"desc\">${c.full}<\u002Fdiv>\n        <div class=\"foot\"><span class=\"fd\"><\u002Fspan>自己調整方略カード<span class=\"auth\">作成：木村明憲<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"face back ${th}\">\n      <div class=\"qmark\">?<\u002Fdiv>\n      <div class=\"pl\">${c.phase}<\u002Fdiv>\n      <div class=\"subcat\">${c.sub} ／ ${c.process}<\u002Fdiv>\n      <div class=\"qlabel\">どんな場面で使う?<\u002Fdiv>\n      <div class=\"qtext\">${c.q}<\u002Fdiv>\n      <div class=\"talk\">▶ 答えはこのカードのおもて<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv><\u002Fdiv>`;\n}\nfunction render(){\n  const idx=active(),grid=document.getElementById('grid');\n  grid.innerHTML=idx.map(cardHTML).join('');\n  document.getElementById('empty').style.display=idx.length?'none':'block';\n  const favN=state.fav.size;\n  document.getElementById('count').textContent=`${idx.length}枚を表示中`+(favN?`（★${favN}）`:'');\n  grid.querySelectorAll('.card').forEach(el=>el.addEventListener('click',()=>el.classList.toggle('flipped')));\n  grid.querySelectorAll('.fav').forEach(el=>el.addEventListener('click',e=>{\n    e.stopPropagation();\n    const i=+el.dataset.fav;\n    if(state.fav.has(i))state.fav.delete(i); else state.fav.add(i);\n    saveFav(); el.classList.toggle('on',state.fav.has(i));\n    document.getElementById('count').textContent=`${active().length}枚を表示中`+(state.fav.size?`（★${state.fav.size}）`:'');\n    if(state.favOnly)render();\n  }));\n}\ndocument.getElementById('phaseBar').addEventListener('click',e=>{\n  const chip=e.target.closest('.chip');if(!chip)return;\n  const on=chip.dataset.on===\"1\"?0:1;chip.dataset.on=on;\n  if(chip.dataset.phase)state.phases[chip.dataset.phase]=on;render();\n});\ndocument.getElementById('shuffleBtn').onclick=()=>{for(let k=state.order.length-1;k>0;k--){const j=Math.floor(Math.random()*(k+1));[state.order[k],state.order[j]]=[state.order[j],state.order[k]];}render();};\ndocument.getElementById('flipAllBtn').onclick=()=>{const cs=document.querySelectorAll('.card');const any=[...cs].some(c=>!c.classList.contains('flipped'));cs.forEach(c=>c.classList.toggle('flipped',any));};\ndocument.getElementById('resetBtn').onclick=()=>{\n  state.phases={\"見通す\":1,\"実行する\":1,\"振り返る\":1};\n  state.order=CARDS.map((_,i)=>i);\n  state.search=\"\"; state.fProc.clear(); state.fCat.clear(); state.fSub.clear(); state.favOnly=false;\n  document.querySelectorAll('.chip[data-phase]').forEach(c=>c.dataset.on=\"1\");\n  document.querySelectorAll('.fchip').forEach(c=>c.dataset.on=\"0\");\n  document.getElementById('searchInput').value=\"\"; document.getElementById('searchBox').classList.remove('has');\n  document.getElementById('spotlight').classList.remove('on');\n  render();\n};\nlet current=-1;\nfunction draw(){\n  const idx=active();if(!idx.length)return;\n  let pick;do{pick=idx[Math.floor(Math.random()*idx.length)];}while(idx.length>1&&pick===current);current=pick;\n  const c=CARDS[pick];\n  document.getElementById('spotBadge').innerHTML=`${PDFILL[pick]?`<img src=\"${PDFILL[pick]}\" alt=\"\" style=\"width:100%;border-radius:12px;display:block\">`:`<svg viewBox=\\\"0 0 230 130\\\" xmlns=\\\"http://www.w3.org/2000/svg\\\" style=\\\"width:100%;border-radius:12px;display:block\\\">${ILLUST[pick]}<\u002Fsvg>`}<div class=\"pl\" style=\"color:${PHCOLOR[c.phase]}\">${c.phase} ／ ${c.sub}<\u002Fdiv>`;\n  document.getElementById('spotText').textContent=c.q;\n  const rev=document.getElementById('spotReveal');rev.textContent=`答えの方略：${c.title} ── ${c.full}`;rev.classList.remove('on');\n  document.getElementById('spotlight').classList.add('on');\n  document.getElementById('spotlight').scrollIntoView({behavior:'smooth',block:'nearest'});\n}\ndocument.getElementById('drawBtn').onclick=draw;\ndocument.getElementById('anotherBtn').onclick=draw;\ndocument.getElementById('revealBtn').onclick=()=>document.getElementById('spotReveal').classList.toggle('on');\n\n// ── 検索 ──\nconst searchInput=document.getElementById('searchInput');\nconst searchBox=document.getElementById('searchBox');\nsearchInput.addEventListener('input',()=>{\n  state.search=searchInput.value;\n  searchBox.classList.toggle('has',!!searchInput.value);\n  render();\n});\ndocument.getElementById('searchClr').onclick=()=>{\n  searchInput.value=\"\"; state.search=\"\"; searchBox.classList.remove('has'); render(); searchInput.focus();\n};\n\n// ── 絞り込みチップ生成 ──\nconst PROCS=[...new Set(CARDS.map(c=>c.process))];\nconst CATS=[...new Set(CARDS.map(c=>c.cat))];\nconst SUBS=[...new Set(CARDS.map(c=>c.sub))];\nfunction buildChips(rowId,values,setRef){\n  const row=document.getElementById(rowId);\n  values.forEach(v=>{\n    const el=document.createElement('span');\n    el.className='fchip'; el.dataset.on=\"0\"; el.textContent=v;\n    el.onclick=()=>{\n      const on=el.dataset.on===\"1\"?0:1; el.dataset.on=on;\n      if(on)setRef.add(v); else setRef.delete(v);\n      render();\n    };\n    row.appendChild(el);\n  });\n}\nbuildChips('procRow',PROCS,state.fProc);\nbuildChips('catRow',CATS,state.fCat);\nbuildChips('subRow',SUBS,state.fSub);\ndocument.getElementById('favOnly').onclick=function(){\n  const on=this.dataset.on===\"1\"?0:1; this.dataset.on=on; state.favOnly=!!on; render();\n};\ndocument.getElementById('filterToggle').onclick=function(){\n  const body=document.getElementById('filterBody');\n  body.classList.toggle('on');\n  this.textContent=(body.classList.contains('on')?'▴ 絞り込みを閉じる':'▾ くわしく絞り込む（プロセス・サブプロセス・カテゴリー）');\n};\ndocument.getElementById('filterClear').onclick=()=>{\n  state.fProc.clear(); state.fCat.clear(); state.fSub.clear(); state.favOnly=false;\n  document.querySelectorAll('.fchip').forEach(c=>c.dataset.on=\"0\");\n  render();\n};\n\n// ── 今日の3枚モード ──\nconst PHKEY={\"見通す\":\"mitosu\",\"実行する\":\"jikkou\",\"振り返る\":\"furikaeru\"};\nfunction miniCardHTML(i){\n  const c=CARDS[i],th=THEME[c.phase];\n  const svg=PDFILL[i]?`<img class=\"pdfill\" src=\"${PDFILL[i]}\" alt=\"\">`:`<svg viewBox=\"0 0 230 130\" xmlns=\"http://www.w3.org/2000/svg\">${ILLUST[i]}<\u002Fsvg>`;\n  return `<div class=\"card ${th}\" style=\"aspect-ratio:5/7.9;position:relative;cursor:default;border-radius:14px;overflow:hidden;border:1.5px solid;box-shadow:0 8px 20px -14px rgba(60,50,30,.5)\">\n    <div class=\"face front ${th}\" style=\"position:relative;backface-visibility:visible\">\n      <div class=\"band\"><span class=\"phase\">${c.phase}<\u002Fspan><span class=\"tags\"><span class=\"cat\">${c.cat}<\u002Fspan><\u002Fspan><\u002Fdiv>\n      <div class=\"body\">\n        <div class=\"subrow\"><span class=\"sub\">${c.sub}<\u002Fspan><\u002Fdiv>\n        <div class=\"illust\">${svg}<\u002Fdiv>\n        <div class=\"title\">${c.title}<\u002Fdiv>\n        <div class=\"rule\"><\u002Fdiv>\n        <div class=\"desc\">${c.full}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv><\u002Fdiv>`;\n}\nfunction renderToday(){\n  [\"見通す\",\"実行する\",\"振り返る\"].forEach(ph=>{\n    const slot=document.getElementById('slot-'+PHKEY[ph]);\n    const i=state.today[ph];\n    if(i==null||i<0){slot.innerHTML='<div class=\"slot-empty\">まだ選んでいません<\u002Fdiv>';}\n    else{slot.innerHTML=miniCardHTML(i);}\n  });\n  saveToday();\n}\nfunction drawForPhase(ph){\n  const pool=CARDS.map((c,i)=>i).filter(i=>CARDS[i].phase===ph && i!==state.today[ph]);\n  if(!pool.length)return;\n  state.today[ph]=pool[Math.floor(Math.random()*pool.length)];\n  renderToday();\n}\ndocument.querySelectorAll('[data-slot]').forEach(b=>b.onclick=()=>drawForPhase(b.dataset.slot));\ndocument.getElementById('todayAllBtn').onclick=()=>{[\"見通す\",\"実行する\",\"振り返る\"].forEach(drawForPhase);};\ndocument.getElementById('todayClearBtn').onclick=()=>{state.today={\"見通す\":null,\"実行する\":null,\"振り返る\":null};renderToday();};\ndocument.getElementById('todayBtn').onclick=()=>{\n  const p=document.getElementById('todayPanel');\n  ['howtoPanel','playPanel','learnPanel'].forEach(id=>document.getElementById(id).classList.remove('on'));\n  p.classList.toggle('on');\n  if(p.classList.contains('on'))p.scrollIntoView({behavior:'smooth',block:'nearest'});\n};\n['howtoBtn','playBtn','learnBtn'].forEach(id=>{\n  document.getElementById(id).addEventListener('click',()=>document.getElementById('todayPanel').classList.remove('on'));\n});\nrenderToday();\n\nrender();\n<\u002Fscript>\n<\u002Fbody><\u002Fhtml>"
